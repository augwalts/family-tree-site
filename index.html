    box-shadow: 0 1px 4px rgba(0,0,0,0.1);

</style>

<div id="password-screen">

<script>
// ══════════════════════════════════════════════════════════════
// DECRYPTION
// ══════════════════════════════════════════════════════════════
async function decryptData(password) {
  const resp = await fetch('encrypted_data.json');
  if (!resp.ok) throw new Error('Could not load encrypted data');
  const { salt, iv, iterations, ciphertext } = await resp.json();

  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );

  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: base64ToBytes(salt), iterations, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: base64ToBytes(iv) },
    key,
    base64ToBytes(ciphertext)
  );

  return new TextDecoder().decode(decrypted);
}

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function handleUnlock(e) {
  e.preventDefault();
  const pw = document.getElementById('password-input').value;
  const errorEl = document.getElementById('password-error');
  const loadingEl = document.getElementById('loading-msg');
  errorEl.textContent = '';
  loadingEl.style.display = 'block';

  try {
    const gedcomText = await decryptData(pw);
    document.getElementById('password-screen').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
    document.body.style.overflow = 'hidden';
    const data = parseGEDCOM(gedcomText);
    render(data);
    resetView();
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.textContent = 'Wrong password. Try again.';
    document.getElementById('password-input').select();
  }
}

// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════

  tong_younger_brother_wife:["堂弟婦","tong4 dai6 fu5","堂弟's Wife"],tong_younger_sister_husband:["堂妹夫","tong4 mui6 fu1","堂妹's Husband"],
  brother_daughter:["姪女","zat6 neoi5","Brother's Daughter"],brother_son:["侄仔","zat6 zai2","Brother's Son"],

  husband_father:["老爺","lou5 je4","Husband's Father"],husband_mother:["奶奶","naai5 naai5","Husband's Mother"],

  husband_elder_brother:["大伯","daai6 baak3","Husband's Elder Brother"],husband_elder_sister:["姑奶","gu1 naai5","Husband's Elder Sister"],
  husband_younger_brother:["小叔","siu2 suk1","Husband's Younger Brother"],husband_younger_sister:["姑仔","gu1 zai2","Husband's Younger Sister"],

function lookupTerm(key) { return KINSHIP_TERMS[key] || null; }

// ══════════════════════════════════════════════════════════════
// RELATIONSHIP ENGINE
// ══════════════════════════════════════════════════════════════
function parseBirthYear(p){if(!p.birth||!p.birth.date)return null;const parts=p.birth.date.split(/\s+/);for(let i=parts.length-1;i>=0;i--)if(/^\d{4}$/.test(parts[i]))return parseInt(parts[i]);return null;}
function isElder(p,r){const py=parseBirthYear(p),ry=parseBirthYear(r);if(py!==null&&ry!==null)return py<=ry;return true;}
function getParents(p,ind,fam){let f=null,m=null;for(const fid of(p.families_child||[])){const fm=fam[fid];if(!fm)continue;if(fm.husband&&ind[fm.husband])f=ind[fm.husband];if(fm.wife&&ind[fm.wife])m=ind[fm.wife];}return[f,m];}
function getChildren(p,ind,fam){const c=[];for(const fid of(p.families_spouse||[])){const fm=fam[fid];if(!fm)continue;for(const cid of fm.children)if(ind[cid])c.push(ind[cid]);}return c;}
function getSpouse(p,ind,fam){for(const fid of(p.families_spouse||[])){const fm=fam[fid];if(!fm)continue;if(fm.husband===p.id&&fm.wife&&ind[fm.wife])return ind[fm.wife];if(fm.wife===p.id&&fm.husband&&ind[fm.husband])return ind[fm.husband];}return null;}
function getSiblings(p,ind,fam){const s=[],seen=new Set();for(const fid of(p.families_child||[])){const fm=fam[fid];if(!fm)continue;for(const cid of fm.children)if(cid!==p.id&&!seen.has(cid)&&ind[cid]){s.push(ind[cid]);seen.add(cid);}}return s;}

function classifySibling(t,e){const el=isElder(t,e);if(t.sex==='M')return el?'elder_brother':'younger_brother';if(t.sex==='F')return el?'elder_sister':'younger_sister';return null;}
function classifyParentSibling(ps,t,p){const el=isElder(t,p);if(ps==='M'){if(t.sex==='M')return el?'father_elder_brother':'father_younger_brother';if(t.sex==='F')return el?'father_elder_sister':'father_younger_sister';}else{if(t.sex==='M')return'mother_brother';if(t.sex==='F')return el?'mother_elder_sister':'mother_younger_sister';}return null;}
function classifyParentSiblingSpouse(ps,sib,t,p){const el=isElder(sib,p);if(ps==='M'){if(sib.sex==='M')return el?'father_elder_brother_wife':'father_younger_brother_wife';if(sib.sex==='F')return'father_sister_husband';}else{if(sib.sex==='M')return'mother_brother_wife';if(sib.sex==='F')return'mother_sister_husband';}return null;}
function classifyCousin(ps,ua,t,e){const el=isElder(t,e),isTong=(ps==='M'&&ua.sex==='M');if(isTong){if(t.sex==='M')return el?'tong_elder_brother':'tong_younger_brother';return el?'tong_elder_sister':'tong_younger_sister';}else{if(t.sex==='M')return el?'biu_elder_brother':'biu_younger_brother';return el?'biu_elder_sister':'biu_younger_sister';}}
function classifyCousinSpouse(ps,ua,c,t,e){const el=isElder(c,e),isTong=(ps==='M'&&ua.sex==='M');if(isTong){if(c.sex==='M')return el?'tong_elder_brother_wife':'tong_younger_brother_wife';return el?'tong_elder_sister_husband':'tong_younger_sister_husband';}else{if(c.sex==='M')return el?'biu_elder_brother_wife':'biu_younger_brother_wife';return el?'biu_elder_sister_husband':'biu_younger_sister_husband';}}
function classifyNieceNephew(s,t){if(s.sex==='M')return t.sex==='M'?'brother_son':'brother_daughter';if(s.sex==='F')return t.sex==='M'?'sister_son':'sister_daughter';return null;}
function classifyGrandchild(c,t){if(c.sex==='M')return t.sex==='M'?'son_son':'son_daughter';if(c.sex==='F')return t.sex==='M'?'daughter_son':'daughter_daughter';return null;}
function classifyInLawParent(e,t){if(e.sex==='F')return t.sex==='M'?'husband_father':'husband_mother';return t.sex==='M'?'wife_father':'wife_mother';}
function classifyInLawSibling(e,t,sp){const el=isElder(t,sp);if(e.sex==='F'){if(t.sex==='M')return el?'husband_elder_brother':'husband_younger_brother';return el?'husband_elder_sister':'husband_younger_sister';}if(t.sex==='M')return el?'wife_elder_brother':'wife_younger_brother';return el?'wife_elder_sister':'wife_younger_sister';}
function classifyChildSpouse(c){if(c.sex==='M')return'daughter_in_law';if(c.sex==='F')return'son_in_law';return null;}

function computeAllRelationships(egoId,individuals,families){
  const ego=individuals[egoId];if(!ego)return{};
  const cache={},visited=new Set([egoId]);
  function add(p,k){if(visited.has(p.id))return;visited.add(p.id);const t=lookupTerm(k);if(t)cache[p.id]={key:k,chinese:t[0],jyutping:t[1],english:t[2]};}

  const spouse=getSpouse(ego,individuals,families);
  if(spouse)add(spouse,spouse.sex==='M'?'husband':'wife');
  const[father,mother]=getParents(ego,individuals,families);
  if(father)add(father,'father');if(mother)add(mother,'mother');
  const children=getChildren(ego,individuals,families);
  for(const c of children)add(c,c.sex==='M'?'son':'daughter');
  const siblings=getSiblings(ego,individuals,families);
  for(const s of siblings){const k=classifySibling(s,ego);if(k)add(s,k);}

  if(father){const[pfF,pfM]=getParents(father,individuals,families);if(pfF)add(pfF,'paternal_grandfather');if(pfM)add(pfM,'paternal_grandmother');if(pfF){const[ggF,ggM]=getParents(pfF,individuals,families);if(ggF)add(ggF,'paternal_great_grandfather');if(ggM)add(ggM,'paternal_great_grandmother');}}
  if(mother){const[mfF,mfM]=getParents(mother,individuals,families);if(mfF)add(mfF,'maternal_grandfather');if(mfM)add(mfM,'maternal_grandmother');if(mfF){const[ggF,ggM]=getParents(mfF,individuals,families);if(ggF)add(ggF,'maternal_great_grandfather');if(ggM)add(ggM,'maternal_great_grandmother');}}

  for(const[parent,parentSex]of[[father,'M'],[mother,'F']]){if(!parent)continue;const ps=getSiblings(parent,individuals,families);for(const p of ps){const k=classifyParentSibling(parentSex,p,parent);if(k)add(p,k);const pSp=getSpouse(p,individuals,families);if(pSp){const sk=classifyParentSiblingSpouse(parentSex,p,pSp,parent);if(sk)add(pSp,sk);}const pCh=getChildren(p,individuals,families);for(const cousin of pCh){const ck=classifyCousin(parentSex,p,cousin,ego);if(ck)add(cousin,ck);const cSp=getSpouse(cousin,individuals,families);if(cSp){const csk=classifyCousinSpouse(parentSex,p,cousin,cSp,ego);if(csk)add(cSp,csk);}}}}

  for(const s of siblings){const sc=getChildren(s,individuals,families);for(const nn of sc){const k=classifyNieceNephew(s,nn);if(k)add(nn,k);}}
  for(const c of children){const gc=getChildren(c,individuals,families);for(const g of gc){const k=classifyGrandchild(c,g);if(k)add(g,k);}}

  if(spouse){const[spF,spM]=getParents(spouse,individuals,families);if(spF){const k=classifyInLawParent(ego,spF);if(k)add(spF,k);}if(spM){const k=classifyInLawParent(ego,spM);if(k)add(spM,k);}const spSib=getSiblings(spouse,individuals,families);for(const ss of spSib){const k=classifyInLawSibling(ego,ss,spouse);if(k)add(ss,k);}}
  for(const c of children){const cSp=getSpouse(c,individuals,families);if(cSp){const k=classifyChildSpouse(c);if(k)add(cSp,k);}}

  return cache;
}

// GEDCOM PARSER
// ══════════════════════════════════════════════════════════════
function parseGEDCOM(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const individuals = {}, families = {};
  let current = null, currentSub = null;
  for (const line of lines) {
    const match = line.match(/^(\d+)\s+(@\w+@)?\s*(\w+)\s*(.*)?$/);
    if (!match) continue;
    const [, levelStr, id, tag, value] = match;
    const level = parseInt(levelStr);
    if (level === 0) {
      currentSub = null;
      if (tag === 'INDI') { current = { id, names: [], sex: '', birth: {}, death: {}, residence: {}, families_spouse: [], families_child: [], notes: [] }; individuals[id] = current; }
      else if (tag === 'FAM') { current = { id, husband: null, wife: null, children: [] }; families[id] = current; }
      else current = null;
    } else if (level === 1 && current) {
      currentSub = tag;
      if (current.id && current.id.includes('I')) {
        if (tag === 'NAME') current.names.push((value || '').replace(/\//g, '').trim());
        else if (tag === 'SEX') current.sex = (value || '').trim();
        else if (tag === 'BIRT') currentSub = 'BIRT'; else if (tag === 'DEAT') currentSub = 'DEAT'; else if (tag === 'RESI') currentSub = 'RESI';
        else if (tag === 'FAMS') current.families_spouse.push((value || '').trim());
        else if (tag === 'FAMC') current.families_child.push((value || '').trim());
        else if (tag === 'NOTE') current.notes.push((value || '').trim());
      } else {
        if (tag === 'HUSB') current.husband = (value || '').trim();
        else if (tag === 'WIFE') current.wife = (value || '').trim();
        else if (tag === 'CHIL') current.children.push((value || '').trim());
      }
    } else if (level === 2 && current) {
      if (tag === 'DATE') { if (currentSub === 'BIRT') current.birth.date = (value || '').trim(); else if (currentSub === 'DEAT') current.death.date = (value || '').trim(); }
      else if (tag === 'ADDR') { if (currentSub === 'RESI') current.residence.address = (value || '').trim(); }
    }
  }
  return { individuals, families };
}

// TREE LAYOUT ENGINE
// ══════════════════════════════════════════════════════════════
const NODE_W = 170, NODE_H = 64, H_GAP = 30, V_GAP = 90, COUPLE_GAP = 14;
const KIN_LABEL_H = 38;

function layoutTree(data) {
  const { individuals, families } = data;
  const nodes = [], edges = [], positioned = new Set();
  function isRootFamily(famId) { const fam = families[famId]; if (!fam) return false; const husb = fam.husband ? individuals[fam.husband] : null; const wife = fam.wife ? individuals[fam.wife] : null; return !(husb && husb.families_child.some(fc => families[fc])) && !(wife && wife.families_child.some(fc => families[fc])); }
  const rootFamilies = Object.keys(families).filter(isRootFamily);
  if (rootFamilies.length === 0 && Object.keys(families).length > 0) rootFamilies.push(Object.keys(families)[0]);

  function subtreeWidth(famId) { const fam = families[famId]; if (!fam) return NODE_W; const coupleW = NODE_W * 2 + COUPLE_GAP; let childrenW = 0; for (const cid of fam.children) { const child = individuals[cid]; if (!child) continue; const childFams = child.families_spouse.filter(f => families[f]); if (childFams.length > 0) { for (const cf of childFams) childrenW += subtreeWidth(cf) + H_GAP; } else childrenW += NODE_W + H_GAP; } if (childrenW > 0) childrenW -= H_GAP; return Math.max(coupleW, childrenW); }

  const effectiveVGap = currentEgoId ? V_GAP + KIN_LABEL_H : V_GAP;

  function layoutFamily(famId, x, y) {
    const fam = families[famId]; if (!fam) return;
    const totalW = subtreeWidth(famId), coupleX = x + totalW / 2;
    const hx = coupleX - NODE_W - COUPLE_GAP / 2, wx = coupleX + COUPLE_GAP / 2;
    if (fam.husband && !positioned.has(fam.husband)) { nodes.push({ ...individuals[fam.husband], x: hx, y, w: NODE_W, h: NODE_H }); positioned.add(fam.husband); }
    if (fam.wife && !positioned.has(fam.wife)) { nodes.push({ ...individuals[fam.wife], x: wx, y, w: NODE_W, h: NODE_H }); positioned.add(fam.wife); }
    if (fam.husband && fam.wife) edges.push({ type: 'marriage', x1: hx + NODE_W, y1: y + NODE_H / 2, x2: wx, y2: y + NODE_H / 2 });
    const childY = y + NODE_H + effectiveVGap; let childX = x;
    const parentCenterX = coupleX, parentBottomY = y + NODE_H, childPositions = [];
    for (const cid of fam.children) { const child = individuals[cid]; if (!child) continue; const childFams = child.families_spouse.filter(f => families[f]);
      if (childFams.length > 0) { for (const cf of childFams) { const cfW = subtreeWidth(cf); layoutFamily(cf, childX, childY); const cfam = families[cf]; const childCenterX = childX + cfW / 2; if (cfam.husband === cid) childPositions.push({ x: childCenterX - NODE_W - COUPLE_GAP / 2 + NODE_W / 2, y: childY }); else if (cfam.wife === cid) childPositions.push({ x: childCenterX + COUPLE_GAP / 2 + NODE_W / 2, y: childY }); childX += cfW + H_GAP; } }
      else { if (!positioned.has(cid)) { nodes.push({ ...child, x: childX, y: childY, w: NODE_W, h: NODE_H }); positioned.add(cid); } childPositions.push({ x: childX + NODE_W / 2, y: childY }); childX += NODE_W + H_GAP; } }
    if (childPositions.length > 0) { const midY = parentBottomY + effectiveVGap / 2; edges.push({ type: 'line', x1: parentCenterX, y1: parentBottomY, x2: parentCenterX, y2: midY }); const leftX = Math.min(...childPositions.map(c => c.x)); const rightX = Math.max(...childPositions.map(c => c.x)); if (childPositions.length > 1) edges.push({ type: 'line', x1: leftX, y1: midY, x2: rightX, y2: midY }); for (const cp of childPositions) { if (childPositions.length === 1) edges.push({ type: 'line', x1: parentCenterX, y1: midY, x2: cp.x, y2: cp.y }); else edges.push({ type: 'line', x1: cp.x, y1: midY, x2: cp.x, y2: cp.y }); } }
  }

  function layoutOrphans() { let orphanX = 0; const maxX = nodes.length > 0 ? Math.max(...nodes.map(n => n.x + n.w)) + H_GAP * 3 : 0; let orphanY = nodes.length > 0 ? Math.max(...nodes.map(n => n.y)) + effectiveVGap + NODE_H : 0; for (const id of Object.keys(individuals)) { if (!positioned.has(id)) { nodes.push({ ...individuals[id], x: maxX + orphanX, y: orphanY, w: NODE_W, h: NODE_H }); positioned.add(id); orphanX += NODE_W + H_GAP; } } }

  let offsetX = 40;
  for (const rfId of rootFamilies) { const w = subtreeWidth(rfId); layoutFamily(rfId, offsetX, 40); offsetX += w + H_GAP * 3; }
  layoutOrphans();
  return { nodes, edges };
}

function populateSearch(individuals) {
  const select = document.getElementById('person-search');
  const currentVal = select.value;
  select.innerHTML = '<option value="">Select person...</option>';
  const sorted = Object.values(individuals).sort((a, b) => (a.names?.[0] || '').localeCompare(b.names?.[0] || ''));
  for (const p of sorted) { const opt = document.createElement('option'); opt.value = p.id; opt.textContent = p.names?.[0] || 'Unknown'; select.appendChild(opt); }
  if (currentVal) select.value = currentVal;
}

function onSearchSelect(personId) {
  if (!personId || !currentData) return;
  const person = currentData.individuals[personId];
  if (person) { setEgo(personId); showDetail(person); scrollToNode(personId); }
}

function scrollToNode(personId) {
  const node = layoutNodes.find(n => n.id === personId); if (!node) return;
  const svg = document.getElementById('tree-svg'), rect = svg.getBoundingClientRect();
  transform.x = rect.width/2 - node.x*transform.scale - (NODE_W/2)*transform.scale;
  transform.y = rect.height/2 - node.y*transform.scale - (NODE_H/2)*transform.scale;
  applyTransform();
}

function applyTransform() {
  document.getElementById('tree-group').setAttribute('transform', `translate(${transform.x}, ${transform.y}) scale(${transform.scale})`);
  document.getElementById('zoom-display').textContent = Math.round(transform.scale * 100) + '%';
}

// ── Zoom & Pan ──
function zoomBy(factor) { const svg = document.getElementById('tree-svg'), rect = svg.getBoundingClientRect(), cx = rect.width/2, cy = rect.height/2; const newScale = Math.max(0.1, Math.min(5, transform.scale * factor)), sc = newScale / transform.scale; transform.x = cx - sc * (cx - transform.x); transform.y = cy - sc * (cy - transform.y); transform.scale = newScale; applyTransform(); }
function resetView() { transform = { x: 60, y: 60, scale: 1 }; applyTransform(); }

document.getElementById('canvas-container').addEventListener('wheel', (e) => { e.preventDefault(); const factor = e.deltaY < 0 ? 1.08 : 0.92; const svg = document.getElementById('tree-svg'), rect = svg.getBoundingClientRect(); const mx = e.clientX - rect.left, my = e.clientY - rect.top; const newScale = Math.max(0.1, Math.min(5, transform.scale * factor)), sc = newScale / transform.scale; transform.x = mx - sc * (mx - transform.x); transform.y = my - sc * (my - transform.y); transform.scale = newScale; applyTransform(); }, { passive: false });

let isPanning = false, panStart = { x: 0, y: 0 };
document.getElementById('canvas-container').addEventListener('mousedown', (e) => { if (e.target.closest('.person-node')) return; isPanning = true; panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y }; });
window.addEventListener('mousemove', (e) => { if (!isPanning) return; transform.x = e.clientX - panStart.x; transform.y = e.clientY - panStart.y; applyTransform(); });
window.addEventListener('mouseup', () => { isPanning = false; });

let lastTouchDist = 0;
document.getElementById('canvas-container').addEventListener('touchstart', (e) => { if (e.touches.length === 1) { isPanning = true; panStart = { x: e.touches[0].clientX - transform.x, y: e.touches[0].clientY - transform.y }; } else if (e.touches.length === 2) { isPanning = false; lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); } }, { passive: false });
document.getElementById('canvas-container').addEventListener('touchmove', (e) => { e.preventDefault(); if (e.touches.length === 1 && isPanning) { transform.x = e.touches[0].clientX - panStart.x; transform.y = e.touches[0].clientY - panStart.y; applyTransform(); } else if (e.touches.length === 2) { const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); const factor = dist / lastTouchDist; const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2; const newScale = Math.max(0.1, Math.min(5, transform.scale * factor)), sc = newScale / transform.scale; transform.x = cx - sc * (cx - transform.x); transform.y = cy - sc * (cy - transform.y); transform.scale = newScale; lastTouchDist = dist; applyTransform(); } }, { passive: false });
document.getElementById('canvas-container').addEventListener('touchend', () => { isPanning = false; });

// ── Detail Panel ──
function showDetail(person) {
  const panel = document.getElementById('detail-panel'), content = document.getElementById('detail-content');
  let html = '';
  const kin = kinshipCache[person.id];
  if (currentEgoId && kin && person.id !== currentEgoId) {
    html += `<div class="spotlight-card"><div class="spotlight-chinese">${kin.chinese}</div><div class="spotlight-jyutping">${kin.jyutping}</div><div class="spotlight-english">${kin.english}</div></div>`;
  }
  html += `<h2>${person.names?.[0] || 'Unknown'}</h2>`;
  const altNames = person.names ? person.names.slice(1) : [];
  if (altNames.length) html += `<div style="font-size:18px;color:#555;margin-top:-10px;margin-bottom:16px">${altNames.join(' / ')}</div>`;
  if (person.id !== currentEgoId) html += `<button class="perspective-btn" onclick="setEgo('${person.id}')">View from ${person.names?.[0] || 'this person'}'s perspective</button>`;
  else html += `<div style="margin-bottom:12px;padding:6px 12px;background:#fff8e7;border-radius:6px;font-size:13px;color:#8a6d2b;display:inline-block">Currently viewing as this person</div>`;

  const addRow = (l, v) => { if (v) html += `<div class="detail-row"><div class="detail-label">${l}</div><div class="detail-value">${v}</div></div>`; };
  html += '<div style="margin-top:16px">';
  addRow('Gender', person.sex === 'M' ? 'Male' : person.sex === 'F' ? 'Female' : 'Unknown');
  addRow('Born', person.birth?.date || ''); addRow('Died', person.death?.date || '');
  if (person.residence?.address) { const last = person.residence.address.split(',').pop().trim().replace(/\d{5}(-\d{4})?$/, '').trim(); if (last) addRow('Location', last); }
  if (currentData) {
    for (const fc of (person.families_child || [])) { const fam = currentData.families[fc]; if (fam) { if (fam.husband) addRow('Father', currentData.individuals[fam.husband]?.names?.[0] || ''); if (fam.wife) addRow('Mother', currentData.individuals[fam.wife]?.names?.[0] || ''); const siblings = fam.children.filter(c => c !== person.id).map(c => currentData.individuals[c]?.names?.[0]).filter(Boolean); if (siblings.length) addRow('Siblings', siblings.join(', ')); } }
    for (const fs of (person.families_spouse || [])) { const fam = currentData.families[fs]; if (fam) { const spouseId = fam.husband === person.id ? fam.wife : fam.husband; if (spouseId) addRow('Spouse', currentData.individuals[spouseId]?.names?.[0] || ''); const children = fam.children.map(c => currentData.individuals[c]?.names?.[0]).filter(Boolean); if (children.length) addRow('Children', children.join(', ')); } }
  }

  html += '</div>';

  if (person.id === currentEgoId && Object.keys(kinshipCache).length > 0) {
    const byCategory = {};
    for (const [pid, k] of Object.entries(kinshipCache)) { const cat = KEY_TO_CATEGORY[k.key] || 'Other'; if (!byCategory[cat]) byCategory[cat] = []; byCategory[cat].push({ person: currentData.individuals[pid], kin: k }); }
    html += '<div class="relatives-section"><h3>All Relatives</h3>';
    for (const cat of CATEGORY_ORDER) { const items = byCategory[cat]; if (!items?.length) continue; html += `<div style="margin-bottom:12px"><div style="font-size:11px;color:#aaa;margin-bottom:4px">${cat}</div>`;
      for (const item of items) { const name = item.person?.names?.[0] || 'Unknown'; html += `<div class="relative-row" onclick="showDetailById('${item.person?.id}')"><span class="relative-kin">${item.kin.chinese}</span><span><div class="relative-name">${name}</div><div class="relative-detail">${item.kin.jyutping} &middot; ${item.kin.english}</div></span></div>`; }
      html += '</div>'; }
    html += '</div>';
  }
  content.innerHTML = html; panel.classList.add('open');
}

function showDetailById(personId) { if (!currentData || !personId) return; const person = currentData.individuals[personId]; if (person) { showDetail(person); scrollToNode(personId); } }
function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }

document.addEventListener('keydown', (e) => {
  if (e.key === '=' || e.key === '+') zoomBy(1.25);
  else if (e.key === '-') zoomBy(0.8);
  else if (e.key === '0') resetView();
  else if (e.key === 'Escape') { if (document.getElementById('detail-panel').classList.contains('open')) closeDetail(); else if (currentEgoId) clearEgo(); }
});
</script>
</body>
</html>
